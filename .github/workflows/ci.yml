name: CI Pipeline

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4   # ✅ updated

    - name: Setup Python
      uses: actions/setup-python@v5   # ✅ updated
      with:
        python-version: '3.10'

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Lint check (code quality)
      run: |
        pip install flake8
        flake8 . || true

    - name: Run project
      run: |
        python main.py

    - name: Success message
      run: echo "✅ CI Pipeline executed successfully"
